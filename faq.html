<!-- ══ MOBILE APP DOWNLOAD POPUP ════════════════════════════════
     Shows only on Android devices, only once per session,
     dismissed state stored in localStorage so it never re-appears.
     ════════════════════════════════════════════════════════════ -->
<div id="app-popup" style="display:none;" aria-live="polite" role="dialog" aria-label="Download the Calln app">
    <div class="app-popup-card">
        <button class="app-popup-close" id="app-popup-close" aria-label="Dismiss">✕</button>
        <div class="app-popup-icon">📱</div>
        <div class="app-popup-body">
            <strong class="app-popup-title">Get the Calln App</strong>
            <p class="app-popup-sub">Free on Android · No ads · Calls stay live in background</p>
        </div>
        <a class="app-popup-btn"
           href="https://play.google.com/store/apps/details?id=io.calln.voice.global&pcampaignid=web_share"
           target="_blank" rel="noopener"
           id="app-popup-download">
            Download
        </a>
    </div>
</div>

<style>
/* ── Popup container ─────────────────────────────── */
#app-popup {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 9999;
    padding: 0 12px 12px;
    animation: slideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

@keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
}

/* ── Card ────────────────────────────────────────── */
.app-popup-card {
    background: #141722;
    border: 1px solid rgba(91,124,250,0.3);
    border-radius: 18px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 -4px 30px rgba(0,0,0,0.5), 0 0 0 1px rgba(91,124,250,0.1);
    max-width: 480px;
    margin: 0 auto;
    position: relative;
}

/* ── Close button ────────────────────────────────── */
.app-popup-close {
    position: absolute;
    top: 10px;
    right: 12px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.35);
    font-size: 0.8rem;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
    transition: color 0.2s;
}
.app-popup-close:hover { color: rgba(255,255,255,0.7); }

/* ── Icon ────────────────────────────────────────── */
.app-popup-icon {
    font-size: 1.8rem;
    flex-shrink: 0;
    line-height: 1;
}

/* ── Text ────────────────────────────────────────── */
.app-popup-body { flex: 1; min-width: 0; padding-right: 20px; }

.app-popup-title {
    display: block;
    font-size: 0.9rem;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 3px;
    font-family: 'Outfit', sans-serif;
}

.app-popup-sub {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.45);
    line-height: 1.4;
    font-family: 'Outfit', sans-serif;
    margin: 0;
}

/* ── Download button ─────────────────────────────── */
.app-popup-btn {
    flex-shrink: 0;
    background: #5b7cfa;
    color: #ffffff;
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 700;
    padding: 9px 18px;
    border-radius: 50px;
    transition: opacity 0.2s, transform 0.15s;
    font-family: 'Outfit', sans-serif;
    white-space: nowrap;
}
.app-popup-btn:hover {
    opacity: 0.88;
    transform: scale(1.03);
}

/* ── Only show on mobile-width screens ───────────── */
@media (min-width: 700px) {
    #app-popup { display: none !important; }
}
</style>

<script>
(function () {
    const STORAGE_KEY = 'calln_app_popup_dismissed';

    // Only show on Android user agents
    const isAndroid = /android/i.test(navigator.userAgent);

    // Never show if already dismissed
    const dismissed = localStorage.getItem(STORAGE_KEY);

    if (!isAndroid || dismissed) return;

    // Show popup after 4 seconds so it does not interrupt page load
    const popup = document.getElementById('app-popup');
    const closeBtn = document.getElementById('app-popup-close');
    const downloadBtn = document.getElementById('app-popup-download');

    setTimeout(function () {
        popup.style.display = 'block';
    }, 4000);

    // Dismiss on close button
    closeBtn.addEventListener('click', function () {
        popup.style.display = 'none';
        localStorage.setItem(STORAGE_KEY, '1');
    });

    // Also dismiss (but still let the link open) when download is tapped
    downloadBtn.addEventListener('click', function () {
        localStorage.setItem(STORAGE_KEY, '1');
        setTimeout(function () { popup.style.display = 'none'; }, 300);
    });
})();
</script>
